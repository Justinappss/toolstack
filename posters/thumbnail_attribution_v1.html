<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attribution Black Hole - V1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Inter', sans-serif;
    }

    .banner-canvas {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #050505;
      overflow: hidden;
      display: flex;
      color: #fff;
    }

    /* Background Grid & Vignette */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(56, 189, 248, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(56, 189, 248, 0.05) 1px, transparent 1px);
      background-size: 80px 80px;
      z-index: 1;
      opacity: 0.8;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
    }

    .vignette {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 200px #050505;
      z-index: 5;
      pointer-events: none;
    }

    /* Content Layout */
    .left-panel {
      position: relative;
      z-index: 10;
      width: 55%;
      height: 100%;
      padding: 80px 40px 80px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 96px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.04em;
      margin-bottom: 24px;
      text-transform: uppercase;
      background: linear-gradient(to right, #ffffff, #e2e8f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
    }

    .highlight {
      color: #38bdf8;
      -webkit-text-fill-color: #38bdf8;
      text-shadow: 0 0 40px rgba(56, 189, 248, 0.6);
    }

    .subtitle {
      font-size: 36px;
      color: #94a3b8;
      font-weight: 600;
      letter-spacing: 0.02em;
      border-left: 4px solid #38bdf8;
      padding-left: 24px;
      line-height: 1.3;
      max-width: 90%;
    }

    /* Vortex / Black Hole (Right Side) */
    .right-panel {
      position: absolute;
      right: -100px;
      top: 50%;
      transform: translateY(-50%);
      width: 800px;
      height: 800px;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Black Hole Core & Glows */
    .vortex-glow-1 {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(56,189,248,0.4) 0%, rgba(14,165,233,0.1) 40%, transparent 70%);
      filter: blur(40px);
      animation: pulse 4s infinite alternate;
    }

    .vortex-glow-2 {
      position: absolute;
      width: 600px;
      height: 600px;
      background: conic-gradient(from 0deg, transparent 0%, rgba(56,189,248,0.8) 25%, transparent 50%, rgba(56,189,248,0.8) 75%, transparent 100%);
      border-radius: 50%;
      filter: blur(20px);
      animation: spin 10s linear infinite;
      opacity: 0.6;
    }

    .vortex-rings {
      position: absolute;
      width: 400px;
      height: 400px;
      border: 2px dashed rgba(56, 189, 248, 0.5);
      border-radius: 50%;
      animation: spin-reverse 20s linear infinite;
      box-shadow: 0 0 50px rgba(56, 189, 248, 0.5), inset 0 0 50px rgba(56, 189, 248, 0.5);
    }
    
    .vortex-rings-inner {
      position: absolute;
      width: 250px;
      height: 250px;
      border: 4px solid rgba(56, 189, 248, 0.8);
      border-radius: 50%;
      animation: spin 15s linear infinite;
      box-shadow: 0 0 80px rgba(56, 189, 248, 0.8), inset 0 0 80px rgba(56, 189, 248, 0.8);
    }

    .vortex-core {
      position: absolute;
      width: 160px;
      height: 160px;
      background: #000;
      border-radius: 50%;
      box-shadow: 
        0 0 60px 20px #000,
        0 0 100px 40px rgba(56, 189, 248, 0.6);
      z-index: 10;
    }

    /* Sucked-in Icons */
    .icon-particle {
      position: absolute;
      width: 60px;
      height: 60px;
      background: #1e293b;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      z-index: 15;
    }

    .icon-particle img, .icon-particle svg {
      width: 36px;
      height: 36px;
      border-radius: 8px;
    }

    /* Positioning the icons around the vortex, showing them getting sucked in */
    .icon-1 { /* Google Ads */
      top: 15%; left: 20%;
      transform: rotate(-15deg) scale(1.2);
      filter: drop-shadow(0 0 20px rgba(234, 67, 53, 0.4));
    }
    .icon-2 { /* Facebook */
      bottom: 25%; left: 10%;
      transform: rotate(25deg) scale(0.9);
      filter: drop-shadow(0 0 20px rgba(24, 119, 242, 0.4));
    }
    .icon-3 { /* LinkedIn */
      top: 20%; right: 25%;
      transform: rotate(40deg) scale(0.7);
      filter: blur(1px) drop-shadow(0 0 15px rgba(10, 102, 194, 0.4));
      opacity: 0.8;
    }
    .icon-4 { /* Envelope / Email */
      bottom: 30%; right: 35%;
      transform: rotate(-35deg) scale(0.5);
      filter: blur(2px) drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
      opacity: 0.6;
    }
    .icon-5 { /* Generic cursor/click */
      top: 45%; left: 35%;
      transform: rotate(-60deg) scale(0.4);
      filter: blur(3px);
      opacity: 0.4;
    }

    /* Animations */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
    @keyframes pulse { 100% { opacity: 0.6; transform: scale(1.05); } }

  </style>
</head>
<body>
  <div class="banner-canvas">
    <div class="bg-grid"></div>
    <div class="vignette"></div>

    <div class="left-panel">
      <h1 class="title">THE <br><span class="highlight">ATTRIBUTION</span> <br>BLACK HOLE</h1>
      <p class="subtitle">Why GA4 loses your traffic</p>
    </div>

    <div class="right-panel">
      <div class="vortex-glow-1"></div>
      <div class="vortex-glow-2"></div>
      <div class="vortex-rings"></div>
      <div class="vortex-rings-inner"></div>
      <div class="vortex-core"></div>

      <!-- Sucked in icons -->
      <div class="icon-particle icon-1">
        <!-- Google Ads (simplified representation) -->
        <svg viewBox="0 0 24 24" fill="#34a853"><path d="M21 13v-2h-3v-3h-2v3h-3v2h3v3h2v-3h3z" fill="#ea4335"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="#fbbc04"/></svg>
      </div>
      <div class="icon-particle icon-2">
        <!-- Facebook -->
        <svg viewBox="0 0 24 24" fill="#1877f2"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg>
      </div>
      <div class="icon-particle icon-3">
        <!-- LinkedIn -->
        <svg viewBox="0 0 24 24" fill="#0a66c2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </div>
      <div class="icon-particle icon-4">
        <!-- Envelope -->
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </div>
      <div class="icon-particle icon-5">
        <!-- Cursor -->
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7.4-4.4 4.8z"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
