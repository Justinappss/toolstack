<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thumbnail: Title Comparison</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:ital,wght@0,500;0,700;0,900;1,900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Poppins', sans-serif;
    }

    /* 16:9 Aspect Ratio */
    .thumbnail-container {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #0a0a0a;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      display: flex;
    }

    /* Panels */
    .panel {
      width: 50%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 60px 80px 60px;
    }

    /* Left Panel - Before */
    .left-panel {
      background: radial-gradient(circle at center, #2a3441 0%, #0a0a0a 100%);
    }

    /* Right Panel - After */
    .right-panel {
      background: radial-gradient(circle at center, rgba(96, 165, 250, 0.4) 0%, #0a0a0a 80%);
    }

    /* Central Glowing Divider */
    .divider {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 100%;
      background: #fff;
      box-shadow: 0 0 30px 10px rgba(96, 165, 250, 0.8), 0 0 60px 20px rgba(96, 165, 250, 0.5);
      z-index: 5;
    }

    /* Top Center Question */
    .top-question {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Oswald', sans-serif;
      font-size: 65px;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(96, 165, 250, 0.8), 0 5px 10px rgba(0,0,0,0.8);
      z-index: 10;
      width: 100%;
      text-align: center;
      pointer-events: none;
    }

    /* Panel Headers (BEFORE / AFTER) */
    .panel-header {
      position: absolute;
      top: 140px;
      font-family: 'Oswald', sans-serif;
      font-size: 55px;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .before-text { color: #FF3B30; }
    .after-text { color: #34C759; }

    /* Background Graphics/Emojis */
    .bg-icon {
      position: absolute;
      font-size: 300px;
      opacity: 0.15;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      filter: grayscale(0.5);
    }
    
    .right-panel .bg-icon {
      opacity: 0.3;
      filter: none;
      display: flex;
      gap: -20px;
      align-items: center;
    }

    /* Floating Title Cards */
    .title-card {
      position: relative;
      z-index: 3;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 16px;
      padding: 40px 30px;
      width: 100%;
      text-align: center;
      border: 3px solid;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }

    .title-card-before {
      border-color: #555;
      font-family: 'Helvetica', sans-serif;
      font-size: 38px;
      color: #bbb;
      font-weight: 500;
      transform: rotate(-2deg);
    }

    .title-card-after {
      border-color: #60a5fa;
      font-family: 'Poppins', sans-serif;
      font-size: 46px;
      color: #fff;
      font-weight: 900;
      font-style: italic;
      transform: rotate(2deg) scale(1.05);
      box-shadow: 0 20px 50px rgba(96, 165, 250, 0.3), 0 0 30px rgba(96, 165, 250, 0.2) inset;
      line-height: 1.2;
    }

    .highlight-yellow {
      color: #FFB100;
      text-shadow: 0 0 20px rgba(255, 177, 0, 0.5);
    }

    /* Small Corner Badges */
    .corner-badge {
      position: absolute;
      top: -25px;
      right: -25px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 35px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      color: white;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    .badge-red { background: #FF3B30; }
    .badge-green { background: #34C759; }

    /* Bottom Branding */
    .branding-left {
      position: absolute;
      bottom: 40px;
      left: 40px;
      background: #60a5fa;
      color: #000;
      font-family: 'Oswald', sans-serif;
      font-size: 32px;
      padding: 10px 24px;
      border-radius: 8px;
      text-transform: uppercase;
      transform: rotate(-2deg);
      box-shadow: 0 8px 20px rgba(96, 165, 250, 0.4);
      z-index: 10;
    }

    .branding-right {
      position: absolute;
      bottom: 40px;
      right: 40px;
      color: #60a5fa;
      font-family: 'Poppins', sans-serif;
      font-size: 35px;
      font-weight: 900;
      text-transform: lowercase;
      z-index: 10;
      text-shadow: 0 5px 10px rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      gap: 10px;
    }

  </style>
</head>
<body>

  <div class="thumbnail-container">
    
    <div class="top-question">WHICH TITLE WOULD YOU CLICK?</div>
    <div class="divider"></div>

    <!-- LEFT PANEL -->
    <div class="panel left-panel">
      <div class="panel-header before-text">❌ BEFORE</div>
      
      <!-- Quill background icon -->
      <div class="bg-icon">✒️</div>

      <div class="title-card title-card-before">
        <div class="corner-badge badge-red">✖</div>
        "How to Improve Email Marketing"
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel right-panel">
      <div class="panel-header after-text">✅ AFTER</div>
      
      <!-- Rocket & Target background icon -->
      <div class="bg-icon">🚀🎯</div>

      <div class="title-card title-card-after">
        <div class="corner-badge badge-green">✔</div>
        "<span class="highlight-yellow">7 WAYS</span> TO DOUBLE OPEN RATES <span class="highlight-yellow">IN 30 DAYS</span>"
      </div>
    </div>

    <!-- Branding -->
    <div class="branding-left">FREE TOOL</div>
    <div class="branding-right">toolstack.tech</div>

  </div>

</body>
</html>
