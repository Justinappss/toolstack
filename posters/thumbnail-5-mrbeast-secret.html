<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Word Counter Thumbnail 5 — MrBeast Secret</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: 'Impact', 'Arial Black', sans-serif;
    background: #000;
  }
  .bg-base {
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, #1b5e20 0%, #000000 100%);
  }
  .sunburst {
    position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: repeating-conic-gradient(from 0deg, rgba(0, 255, 0, 0.15) 0deg 10deg, transparent 10deg 20deg);
    animation: rotate 60s linear infinite;
  }
  @keyframes rotate { 100% { transform: rotate(360deg); } }
  
  .photo {
    position: absolute; left: -80px; bottom: -30px;
    height: 125%; width: auto; z-index: 10;
    filter: drop-shadow(20px 0px 40px rgba(0,0,0,0.9)) contrast(1.15) saturate(1.2);
  }

  .text-container {
    position: absolute; top: 100px; right: 30px; z-index: 20;
    display: flex; flex-direction: column; transform: rotate(5deg);
    align-items: center;
  }

  .text-line-1 {
    font-size: 220px; color: #ffe600; line-height: 0.9;
    text-transform: uppercase;
    -webkit-text-stroke: 8px #000;
    text-shadow: 15px 15px 0 #000, 0 0 50px #ff0000;
  }
  .text-line-2 {
    font-size: 160px; color: #fff; line-height: 0.9;
    text-transform: uppercase;
    -webkit-text-stroke: 6px #000;
    text-shadow: 12px 12px 0 #000;
    margin-top: -10px;
  }
  .text-line-3 {
    font-size: 180px; color: #00ff00; line-height: 0.85;
    text-transform: uppercase;
    -webkit-text-stroke: 7px #000;
    text-shadow: 15px 15px 0 #000, 0 0 60px #00ff00;
    margin-top: 10px;
  }

  .circle-highlight {
    position: absolute; top: 40px; right: 20px; z-index: 15;
    width: 600px; height: 600px;
    border: 30px solid red; border-radius: 50%;
    transform: rotate(-10deg); opacity: 0.8;
    box-shadow: 0 0 100px red, inset 0 0 50px red;
  }
</style>
</head>
<body>
  <div class="bg-base"></div>
  <div class="sunburst"></div>
  
  <img src="assets/pereira_secret.png" class="photo" alt="Alex Pereira Secret">

  <div class="circle-highlight"></div>

  <div class="text-container">
    <div class="text-line-1">1 TRICK</div>
    <div class="text-line-2">TO FIX</div>
    <div class="text-line-3">WRITING!</div>
  </div>
</body>
</html>
