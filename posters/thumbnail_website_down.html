<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Down Thumbnail</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #000;
      font-family: 'Inter', sans-serif;
    }

    .banner-canvas {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #0a0f1e;
      overflow: hidden;
      display: flex;
      color: #fff;
    }

    /* Grid Overlay */
    .grid-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }
    
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 40%, rgba(10, 15, 30, 0.9) 100%);
      z-index: 2;
      pointer-events: none;
    }

    /* Layout Sections */
    .left-side {
      position: relative;
      width: 60%;
      height: 100%;
      z-index: 10;
      padding: 100px 40px 100px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right-side {
      position: relative;
      width: 40%;
      height: 100%;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-right: 60px;
      perspective: 1000px;
    }

    /* Text Formatting */
    .title-line-1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 160px;
      line-height: 0.85;
      color: #ffffff;
      letter-spacing: 0.02em;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
    }

    .title-line-2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 210px;
      line-height: 0.85;
      color: #ff3b3b;
      letter-spacing: 0.02em;
      text-shadow: 0 0 60px rgba(255,59,59,0.8), 0 0 100px rgba(255,59,59,0.4);
      margin-top: 10px;
      margin-bottom: 30px;
    }

    .subtitle {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f1f5f9;
      background: rgba(255,59,59,0.2);
      border-left: 6px solid #ff3b3b;
      padding: 15px 25px;
      display: inline-block;
      width: fit-content;
    }

    /* Browser Mockup */
    .browser-window {
      width: 480px;
      height: 380px;
      background: #1e1e2d;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.9), 0 0 100px rgba(255,59,59,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: rotateY(-10deg) rotateX(5deg);
      position: relative;
    }

    .browser-top {
      height: 40px;
      background: #2b2b3c;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .browser-dots {
      display: flex;
      gap: 6px;
    }
    .dot {
      width: 12px; height: 12px; border-radius: 50%;
    }
    .dot:nth-child(1) { background: #ff5f56; }
    .dot:nth-child(2) { background: #ffbd2e; }
    .dot:nth-child(3) { background: #27c93f; }

    .browser-address {
      flex: 1;
      height: 24px;
      background: #1a1a24;
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
    }

    .padlock-broken {
      display: flex;
      align-items: center;
      position: relative;
    }
    
    .padlock-broken svg {
      width: 14px; height: 14px;
    }
    .red-x {
      position: absolute;
      color: #ff3b3b;
      font-size: 16px;
      font-weight: 900;
      top: -2px;
      right: -2px;
    }

    .url-text {
      font-size: 12px;
      color: #94a3b8;
      font-family: monospace;
    }

    .browser-content {
      flex: 1;
      background: #120505; /* Dark red tint */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 4px solid #3b0a0a;
      border-top: none;
    }

    .error-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 120px;
      color: #ff3b3b;
      line-height: 1;
      text-shadow: 0 0 30px rgba(255,59,59,0.5);
    }
    
    .error-icon svg {
      width: 80px;
      height: 80px;
      stroke: #ff3b3b;
      margin-bottom: 10px;
    }

    .error-text {
      font-size: 20px;
      font-weight: 700;
      color: #fca5a5;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 10px;
    }

    /* Flashing Offline Badge */
    .offline-badge {
      position: absolute;
      top: -20px;
      right: -20px;
      background: #ff3b3b;
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      padding: 8px 24px;
      border-radius: 8px;
      box-shadow: 0 10px 20px rgba(255,59,59,0.6);
      transform: rotate(10deg);
      animation: pulse 1s infinite alternate;
      border: 2px solid #fff;
      z-index: 20;
    }

    @keyframes pulse {
      0% { opacity: 0.8; transform: rotate(10deg) scale(1); box-shadow: 0 0 20px rgba(255,59,59,0.5); }
      100% { opacity: 1; transform: rotate(10deg) scale(1.1); box-shadow: 0 0 40px rgba(255,59,59,0.9); }
    }

    /* Ronaldinho Cutout */
    .face-cutout {
      position: absolute;
      bottom: 60px; /* above the bottom strip */
      right: 320px; /* positioned between text and browser */
      height: 550px;
      z-index: 15;
      filter: drop-shadow(-20px 0 30px rgba(0,0,0,0.8));
    }

    /* Bottom Strip */
    .bottom-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      z-index: 20;
      background: #0a0f1e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .neon-line {
      width: 100%;
      height: 4px;
      background: #00f5ff;
      box-shadow: 0 0 15px #00f5ff, 0 0 30px #00f5ff;
      position: absolute;
      top: 0;
    }

    .strip-text {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.3em;
      color: #fff;
      text-transform: uppercase;
      margin-top: 4px;
    }

  </style>
</head>
<body>
  <div class="banner-canvas">
    <div class="grid-pattern"></div>
    <div class="vignette"></div>

    <div class="left-side">
      <div class="title-line-1">WEBSITE</div>
      <div class="title-line-2">DOWN?</div>
      <div class="subtitle">How to Check in 10 Seconds</div>
    </div>

    <div class="right-side">
      <div class="browser-window">
        <div class="offline-badge">OFFLINE</div>
        <div class="browser-top">
          <div class="browser-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="browser-address">
            <div class="padlock-broken">
              <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <div class="red-x">✗</div>
            </div>
            <div class="url-text">https://yourwebsite.com</div>
          </div>
        </div>
        <div class="browser-content">
          <div class="error-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <!-- Broken link icon -->
              <path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"></path>
              <line x1="8" y1="12" x2="16" y2="12" stroke-dasharray="2 4"></line>
              <line x1="4" y1="4" x2="20" y2="20" stroke="#ff3b3b" stroke-width="3"></line>
            </svg>
          </div>
          <div class="error-code">503</div>
          <div class="error-text">Service Unavailable</div>
        </div>
      </div>
    </div>

    <!-- Ronaldinho Cutout -->
    <img src="../public/blog/ronaldinho_cutout.png" class="face-cutout" alt="Shocked Face" />

    <div class="bottom-strip">
      <div class="neon-line"></div>
      <div class="strip-text">FREE MONITORING TOOLS</div>
    </div>
  </div>
</body>
</html>
