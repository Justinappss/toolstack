<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thumbnail: Hashtag Generator 1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:ital,wght@0,700;0,900;1,900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Poppins', sans-serif;
    }

    /* 16:9 Aspect Ratio */
    .thumbnail-container {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #000;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      border: 4px solid #333;
      display: flex;
    }

    /* Background Layer (Left Side) */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('file:///Users/justinpirrie/.gemini/antigravity/brain/26382741-1e59-498f-acde-3b4f063df801/beckham_expressive_1778756208854.png');
      background-size: cover;
      background-position: center left;
      filter: brightness(1.2) contrast(1.05) saturate(1.2);
      z-index: 1;
    }

    /* Gradient Overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 45%, rgba(0,0,0,0.95) 100%);
      z-index: 2;
    }

    /* Content Layout */
    .content-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      z-index: 3;
      padding: 50px;
    }

    .left-section {
      flex: 1.2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 20px;
    }

    .right-section {
      flex: 0.8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      padding-right: 20px;
    }

    /* Typography */
    .headline {
      font-size: 105px;
      line-height: 1.05;
      color: #FFFFFF;
      text-transform: uppercase;
      font-style: italic;
      font-weight: 900;
      text-shadow: 
        4px 4px 0px #000, 
        8px 8px 0px rgba(0,0,0,0.8);
      transform: rotate(-2deg);
      margin-bottom: 10px;
      width: 800px;
    }

    .headline .highlight {
      color: #FFB100;
      text-shadow: 
        4px 4px 0px #000, 
        8px 8px 0px rgba(0,0,0,0.8),
        0 0 40px rgba(255, 177, 0, 0.4);
      font-size: 120px;
      display: block;
      margin-top: -10px;
    }

    /* Platform Stat Cards */
    .stat-card {
      background: rgba(30, 30, 30, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      border: 3px solid #555;
      display: flex;
      align-items: center;
      gap: 20px;
      width: 380px;
      position: relative;
      transition: transform 0.3s ease;
    }

    .stat-card.insta {
      border-color: #E1306C;
      transform: rotate(2deg);
    }

    .stat-card.tiktok {
      border-color: #00f2fe;
      transform: rotate(-1deg);
      right: 20px;
    }

    .stat-card.youtube {
      border-color: #FF0000;
      transform: rotate(3deg);
    }

    .platform-name {
      font-family: 'Oswald', sans-serif;
      font-size: 32px;
      font-weight: bold;
      color: #FFF;
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .hashtag-count {
      font-family: 'Oswald', sans-serif;
      font-size: 48px;
      font-weight: bold;
      background: #FFF;
      color: #000;
      padding: 5px 15px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
    
    .stat-card.insta .hashtag-count { color: #E1306C; }
    .stat-card.tiktok .hashtag-count { color: #000; background: #00f2fe; }
    .stat-card.youtube .hashtag-count { color: #FF0000; }

    /* Tool Badge */
    .tool-badge {
      position: absolute;
      top: 50px;
      left: 50px;
      background: #00E676;
      color: #000;
      font-family: 'Oswald', sans-serif;
      font-size: 32px;
      padding: 10px 24px;
      border-radius: 8px;
      text-transform: uppercase;
      transform: rotate(-2deg);
      box-shadow: 0 8px 20px rgba(0, 230, 118, 0.4);
      z-index: 4;
    }

  </style>
</head>
<body>

  <div class="thumbnail-container">
    <div class="bg-image"></div>
    <div class="overlay"></div>
    
    <div class="tool-badge">FREE HASHTAG GENERATOR</div>

    <div class="content-wrapper">
      <div class="left-section">
        <h1 class="headline">
          HOW MANY HA$HTAG$
          <span class="highlight">PER PLATFORM?</span>
        </h1>
      </div>
      
      <div class="right-section">
        
        <div class="stat-card insta">
          <div class="platform-name">Instagram</div>
          <div class="hashtag-count">3-5</div>
        </div>

        <div class="stat-card tiktok">
          <div class="platform-name">TikTok</div>
          <div class="hashtag-count">3-4</div>
        </div>

        <div class="stat-card youtube">
          <div class="platform-name">YouTube</div>
          <div class="hashtag-count">3-5</div>
        </div>

      </div>
    </div>
    
  </div>

</body>
</html>
