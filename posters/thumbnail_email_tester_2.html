<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thumbnail: Email Subject Tester 2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Poppins:ital,wght@0,700;0,900;1,900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Poppins', sans-serif;
    }

    /* 16:9 Aspect Ratio */
    .thumbnail-container {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #000;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      border: 4px solid #333;
      display: flex;
    }

    /* Background Layer (Left Side) */
    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('file:///Users/justinpirrie/.gemini/antigravity/brain/26382741-1e59-498f-acde-3b4f063df801/salah_shocked_1778673147351.png');
      background-size: cover;
      background-position: left center;
      filter: brightness(0.85) contrast(1.15) saturate(1.2);
      z-index: 1;
      transform: scaleX(-1); /* Flip image horizontally to have him on the right if needed, but wait! The original requirement is left side. So let's keep it left */
    }

    /* Un-flip the image for version 2 just in case */
    .bg-image {
      transform: none;
      background-position: center 20%;
    }

    /* Gradient Overlay */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 40%, rgba(0,0,0,0.95) 100%);
      z-index: 2;
    }

    /* Content Layout */
    .content-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      z-index: 3;
      padding: 50px;
    }

    .left-section {
      flex: 1.1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 30px;
    }

    .right-section {
      flex: 0.9;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 40px;
    }

    /* Typography */
    .headline {
      font-size: 110px;
      line-height: 1.05;
      color: #FFFFFF;
      text-transform: uppercase;
      font-style: italic;
      font-weight: 900;
      text-shadow: 
        4px 4px 0px #000, 
        8px 8px 0px rgba(0,0,0,0.8);
      transform: rotate(-3deg);
      margin-bottom: 10px;
    }

    .headline .highlight-red {
      color: #FF0055;
      text-shadow: 
        4px 4px 0px #000, 
        8px 8px 0px rgba(0,0,0,0.8),
        0 0 40px rgba(255, 0, 85, 0.5);
      font-size: 130px;
      display: block;
      margin-top: -10px;
    }

    /* Email UI Mockups */
    .email-box {
      background: #ffffff;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      border: 5px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 15px;
      position: relative;
    }

    .email-box.spam {
      border-color: #FF0055;
      transform: rotate(-3deg) scale(0.95);
      opacity: 0.8;
    }

    .email-box.inbox {
      border-color: #00E676;
      transform: rotate(4deg) scale(1.05);
      z-index: 5;
    }

    .email-header {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #eee;
    }

    .email-info {
      flex: 1;
    }

    .sender-name {
      font-family: 'Helvetica', sans-serif;
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }

    .subject-line {
      font-family: 'Helvetica', sans-serif;
      font-size: 26px;
      font-weight: bold;
      color: #111;
      margin-top: 5px;
    }

    .email-box.spam .subject-line {
      color: #999;
      text-decoration: line-through;
    }

    /* Tags */
    .folder-tag {
      position: absolute;
      top: -25px;
      right: -25px;
      font-family: 'Oswald', sans-serif;
      font-size: 34px;
      color: white;
      padding: 8px 26px;
      border-radius: 50px;
      text-transform: uppercase;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .tag-red {
      background: #FF0055;
    }

    .tag-green {
      background: #00E676;
      color: #000;
    }

    .tag-sub {
      font-size: 18px;
      display: block;
      margin-top: -5px;
    }

    /* Tool Badge */
    .tool-badge {
      position: absolute;
      top: 40px;
      left: 40px;
      background: #00E676;
      color: #000;
      font-family: 'Oswald', sans-serif;
      font-size: 32px;
      padding: 10px 24px;
      border-radius: 8px;
      text-transform: uppercase;
      transform: rotate(-2deg);
      box-shadow: 0 8px 20px rgba(0, 230, 118, 0.4);
      z-index: 4;
    }

  </style>
</head>
<body>

  <div class="thumbnail-container">
    <div class="bg-image"></div>
    <div class="overlay"></div>
    
    <div class="tool-badge">SUBJECT LINE TESTER</div>

    <div class="content-wrapper">
      <div class="left-section">
        <h1 class="headline">
          STOP WRITING
          <span class="highlight-red">BLIND!</span>
        </h1>
      </div>
      
      <div class="right-section">
        
        <!-- SPAM Email -->
        <div class="email-box spam">
          <div class="folder-tag tag-red">SPAM</div>
          <div class="email-header">
            <div class="avatar" style="background: #FFCDD2;"></div>
            <div class="email-info">
              <div class="sender-name">Promo Dept</div>
              <div class="subject-line">FREE GIFT INSIDE!!!</div>
            </div>
          </div>
        </div>

        <!-- INBOX Email -->
        <div class="email-box inbox">
          <div class="folder-tag tag-green">INBOX <span class="tag-sub">97% OPEN RATE</span></div>
          <div class="email-header">
            <div class="avatar" style="background: #C8E6C9;"></div>
            <div class="email-info">
              <div class="sender-name">Justin Pirrie</div>
              <div class="subject-line">The 1 word that changes everything</div>
            </div>
          </div>
        </div>

      </div>
    </div>
    
  </div>

</body>
</html>
