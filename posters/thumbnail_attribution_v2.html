<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attribution Black Hole - V2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Inter', sans-serif;
    }

    .banner-canvas {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #050505;
      overflow: hidden;
      display: flex;
      color: #fff;
    }

    /* Ambient Glows */
    .ambient-glow {
      position: absolute;
      width: 1200px;
      height: 1200px;
      background: radial-gradient(circle, rgba(14,165,233,0.1) 0%, transparent 60%);
      top: -200px;
      left: -200px;
      filter: blur(100px);
      z-index: 1;
      pointer-events: none;
    }

    /* Abstract Data Lines Background */
    .data-lines {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(90deg, rgba(56,189,248,0.03) 0px, rgba(56,189,248,0.03) 1px, transparent 1px, transparent 40px);
      z-index: 1;
      transform: perspective(1000px) rotateX(60deg) scale(2);
      transform-origin: bottom center;
      opacity: 0.5;
    }

    /* Content Layout */
    .left-panel {
      position: relative;
      z-index: 20;
      width: 60%;
      height: 100%;
      padding: 100px 40px 100px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .text-card {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.2);
      backdrop-filter: blur(20px);
      padding: 50px;
      border-radius: 30px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 0 40px rgba(56,189,248,0.05);
      position: relative;
      overflow: hidden;
    }
    
    .text-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, #0ea5e9, #38bdf8, #bae6fd);
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 84px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.05em;
      margin-bottom: 24px;
      text-transform: uppercase;
      color: #fff;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    .highlight {
      background: linear-gradient(135deg, #38bdf8, #bae6fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(56, 189, 248, 0.4);
    }

    .subtitle {
      font-size: 32px;
      color: #cbd5e1;
      font-weight: 400;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .subtitle::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      background: #38bdf8;
      border-radius: 4px;
      box-shadow: 0 0 10px #38bdf8;
    }

    /* Vortex / Black Hole (Right Side) 3D Tunnel Effect */
    .right-panel {
      position: absolute;
      right: 0px;
      top: 50%;
      transform: translateY(-50%) perspective(1000px) rotateY(-20deg);
      width: 700px;
      height: 700px;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
    }

    .vortex-layer {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(56, 189, 248, 0.8);
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.4), inset 0 0 40px rgba(56, 189, 248, 0.4);
    }

    .vortex-l1 { width: 700px; height: 700px; transform: translateZ(0px); opacity: 0.1; border-width: 1px; }
    .vortex-l2 { width: 550px; height: 550px; transform: translateZ(-100px); opacity: 0.3; border-width: 2px; }
    .vortex-l3 { width: 400px; height: 400px; transform: translateZ(-200px); opacity: 0.6; border-width: 4px; }
    .vortex-l4 { width: 250px; height: 250px; transform: translateZ(-300px); opacity: 0.9; border-width: 8px; box-shadow: 0 0 80px #38bdf8, inset 0 0 80px #38bdf8; }
    
    .vortex-core {
      position: absolute;
      width: 150px;
      height: 150px;
      background: #000;
      border-radius: 50%;
      transform: translateZ(-400px);
      box-shadow: 0 0 100px 50px rgba(56, 189, 248, 0.8), 0 0 150px 80px #0ea5e9;
      z-index: 10;
    }

    /* Sucked-in Icons - 3D Stream */
    .icon-particle {
      position: absolute;
      width: 70px;
      height: 70px;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(56,189,248,0.3);
      border-radius: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 25;
    }

    .icon-particle svg {
      width: 40px;
      height: 40px;
    }

    /* Motion Trails */
    .trail {
      position: absolute;
      width: 150px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #38bdf8);
      right: 100%;
      top: 50%;
      transform-origin: right center;
      filter: blur(1px);
    }

    /* 3D Positioning for the icons flying into the vortex */
    .icon-1 { /* Google Ads */
      top: 10%; left: 0%;
      transform: translateZ(100px) rotate(-15deg) scale(1.1);
    }
    .icon-1 .trail { width: 200px; transform: rotate(-10deg); }

    .icon-2 { /* Facebook */
      bottom: 15%; left: 10%;
      transform: translateZ(50px) rotate(20deg) scale(0.9);
    }
    .icon-2 .trail { width: 250px; transform: rotate(15deg); }

    .icon-3 { /* LinkedIn */
      top: 30%; right: 40%;
      transform: translateZ(-150px) rotate(45deg) scale(0.6);
      opacity: 0.7;
    }
    .icon-3 .trail { width: 100px; transform: rotate(-25deg); }

    .icon-4 { /* Envelope */
      bottom: 35%; right: 50%;
      transform: translateZ(-250px) rotate(-30deg) scale(0.4);
      opacity: 0.5;
    }
    .icon-4 .trail { width: 80px; transform: rotate(30deg); }

    /* ToolStack Brand Tag */
    .brand-tag {
      position: absolute;
      top: 40px;
      right: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 30;
    }
    .brand-logo {
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #000;
      font-weight: 900;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
    }
    .brand-name {
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

  </style>
</head>
<body>
  <div class="banner-canvas">
    <div class="ambient-glow"></div>
    <div class="data-lines"></div>

    <!-- ToolStack Logo -->
    <div class="brand-tag">
      <div class="brand-logo">T</div>
      <div class="brand-name">TOOLSTACK</div>
    </div>

    <div class="left-panel">
      <div class="text-card">
        <h1 class="title">THE <br>ATTRIBUTION <br><span class="highlight">BLACK HOLE</span></h1>
        <p class="subtitle">Why GA4 loses your traffic</p>
      </div>
    </div>

    <div class="right-panel">
      <!-- 3D Vortex Rings -->
      <div class="vortex-layer vortex-l1"></div>
      <div class="vortex-layer vortex-l2"></div>
      <div class="vortex-layer vortex-l3"></div>
      <div class="vortex-layer vortex-l4"></div>
      <div class="vortex-core"></div>

      <!-- Flying Icons -->
      <div class="icon-particle icon-1">
        <div class="trail"></div>
        <svg viewBox="0 0 24 24" fill="#34a853"><path d="M21 13v-2h-3v-3h-2v3h-3v2h3v3h2v-3h3z" fill="#ea4335"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="#fbbc04"/></svg>
      </div>
      <div class="icon-particle icon-2">
        <div class="trail"></div>
        <svg viewBox="0 0 24 24" fill="#1877f2"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg>
      </div>
      <div class="icon-particle icon-3">
        <div class="trail"></div>
        <svg viewBox="0 0 24 24" fill="#0a66c2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </div>
      <div class="icon-particle icon-4">
        <div class="trail"></div>
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
