<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWeber Blog Header - Dark Wealth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Outfit:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Inter', sans-serif;
    }

    .banner-canvas {
      position: relative;
      width: 1200px;
      height: 630px;
      background-color: #050505;
      overflow: hidden;
      display: flex;
      color: #fff;
    }

    /* Cinematic Lighting & Background */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
      opacity: 0.5;
    }

    .glow-sphere-1 {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
      filter: blur(80px);
      z-index: 2;
    }

    .glow-sphere-2 {
      position: absolute;
      bottom: -30%;
      right: -10%;
      width: 900px;
      height: 900px;
      background: radial-gradient(circle, rgba(14,165,233,0.12) 0%, transparent 70%);
      filter: blur(100px);
      z-index: 2;
    }

    /* Content Layout */
    .content-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      width: 100%;
      height: 100%;
      padding: 80px;
    }

    .left-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 600px;
    }

    .right-column {
      flex: 1;
      position: relative;
      perspective: 1000px;
    }

    /* Typography & Badges */
    .pill-container {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    .pill {
      background: rgba(37,99,235,0.1);
      border: 1px solid rgba(37,99,235,0.3);
      color: #60a5fa;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill.accent {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 72px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    }

    .subtitle {
      font-size: 22px;
      color: #94a3b8;
      line-height: 1.6;
      font-weight: 400;
      margin-bottom: 40px;
      max-width: 500px;
    }

    /* Rating Component */
    .rating-box {
      display: flex;
      align-items: center;
      gap: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 20px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: fit-content;
    }

    .rating-score {
      font-family: 'Outfit', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #3b82f6;
      line-height: 1;
      text-shadow: 0 0 30px rgba(59,130,246,0.5);
    }

    .rating-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rating-label {
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .rating-sub {
      color: #64748b;
      font-size: 14px;
    }

    .stars {
      display: flex;
      gap: 4px;
    }

    .star {
      width: 16px;
      height: 16px;
      background: #3b82f6;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    /* Abstract 3D Hero Elements */
    .hero-art {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-40%, -50%) rotateY(-15deg) rotateX(10deg);
      width: 500px;
      height: 500px;
      transform-style: preserve-3d;
    }

    /* Glass Card 1 */
    .glass-card {
      position: absolute;
      width: 380px;
      height: 480px;
      background: rgba(15,23,42,0.6);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 
        -20px 20px 60px rgba(0,0,0,0.8),
        inset 0 0 0 1px rgba(255,255,255,0.1),
        inset 0 20px 40px rgba(255,255,255,0.05);
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transform: translateZ(50px);
      overflow: hidden;
    }

    /* Glowing Top Edge */
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      opacity: 0.8;
    }

    /* Email UI Elements inside Card */
    .ui-header {
      width: 100%;
      height: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 10px;
    }
    .ui-circle {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }
    
    .ui-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .ui-line {
      height: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
    }
    .ui-line.w-full { width: 100%; }
    .ui-line.w-3-4 { width: 75%; }
    .ui-line.w-1-2 { width: 50%; }

    .ui-chart {
      margin-top: 20px;
      height: 120px;
      background: linear-gradient(to top, rgba(59,130,246,0.2), transparent);
      border-bottom: 2px solid #3b82f6;
      border-radius: 8px 8px 0 0;
      position: relative;
    }
    .ui-chart::after {
      content: '';
      position: absolute;
      top: 20%;
      left: 0;
      right: 0;
      height: 2px;
      background: #60a5fa;
      filter: drop-shadow(0 0 8px #60a5fa);
      transform: rotate(-5deg);
    }

    /* Floating Abstract Elements */
    .float-envelope {
      position: absolute;
      top: 20%;
      right: -20px;
      width: 120px;
      height: 80px;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      border-radius: 12px;
      transform: translateZ(150px) rotate(-15deg);
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .float-envelope::after {
      content: '';
      position: absolute;
      border-top: 40px solid rgba(255,255,255,0.2);
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
      top: 0;
    }

    .float-badge {
      position: absolute;
      bottom: 20%;
      left: -40px;
      background: rgba(15,23,42,0.8);
      border: 1px solid #3b82f6;
      padding: 15px 25px;
      border-radius: 16px;
      transform: translateZ(100px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .float-badge-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #3b82f6;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 20px;
    }
    .float-badge-text div:first-child {
      color: #fff;
      font-weight: 700;
      font-size: 16px;
    }
    .float-badge-text div:last-child {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 4px;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: #60a5fa;
      filter: blur(2px);
    }
    .p1 { width: 8px; height: 8px; top: 10%; right: 10%; transform: translateZ(200px); box-shadow: 0 0 20px #60a5fa; }
    .p2 { width: 12px; height: 12px; bottom: 30%; right: 30%; transform: translateZ(80px); box-shadow: 0 0 30px #60a5fa; }

    /* ToolStack Brand Tag */
    .brand-tag {
      position: absolute;
      top: 40px;
      left: 80px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
    }
    .brand-logo {
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #000;
      font-weight: 900;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
    }
    .brand-name {
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="banner-canvas">
    <div class="bg-grid"></div>
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <div class="brand-tag">
      <div class="brand-logo">T</div>
      <div class="brand-name">TOOLSTACK</div>
    </div>

    <div class="content-wrapper">
      <div class="left-column">
        <div class="pill-container">
          <div class="pill">IN-DEPTH REVIEW</div>
          <div class="pill accent">FREE PLAN TESTED</div>
        </div>

        <h1 class="title">AWeber Review<br>2026 Edition.</h1>
        <p class="subtitle">We tested deliverability, automation, and the new AI tools. Is the 27-year-old giant still the best email platform for creators?</p>

        <div class="rating-box">
          <div class="rating-score">8.2</div>
          <div class="rating-text">
            <div class="rating-label">EXCELLENT VALUE</div>
            <div class="stars">
              <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star" style="opacity:0.3"></div>
            </div>
            <div class="rating-sub">Outperforms Mailchimp in 2026</div>
          </div>
        </div>
      </div>

      <div class="right-column">
        <div class="hero-art">
          <!-- Main Glass Dashboard -->
          <div class="glass-card">
            <div class="ui-header">
              <div class="ui-circle"></div>
              <div class="ui-circle"></div>
              <div class="ui-circle"></div>
            </div>
            <div class="ui-body">
              <div class="ui-line w-full"></div>
              <div class="ui-line w-3-4"></div>
              <div class="ui-line w-1-2"></div>
            </div>
            <div style="margin-top: 10px;">
              <div class="ui-line w-full" style="height:40px; border-radius: 8px;"></div>
            </div>
            <div class="ui-chart"></div>
          </div>

          <!-- Floating Elements -->
          <div class="float-envelope"></div>
          
          <div class="float-badge">
            <div class="float-badge-icon">↗</div>
            <div class="float-badge-text">
              <div>99.8%</div>
              <div>Inbox Deliverability</div>
            </div>
          </div>

          <div class="particle p1"></div>
          <div class="particle p2"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
