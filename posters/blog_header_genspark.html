<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genspark Blog Header - Dark Wealth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Outfit:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Inter', sans-serif;
    }

    .banner-canvas {
      position: relative;
      width: 1200px;
      height: 630px;
      background-color: #050505;
      overflow: hidden;
      display: flex;
      color: #fff;
    }

    /* Cinematic Lighting & Background */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
      opacity: 0.6;
    }

    .glow-sphere-1 {
      position: absolute;
      top: -10%;
      right: -10%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 60%);
      filter: blur(80px);
      z-index: 2;
    }

    .glow-sphere-2 {
      position: absolute;
      bottom: -40%;
      left: -20%;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(79,70,229,0.15) 0%, transparent 70%);
      filter: blur(100px);
      z-index: 2;
    }

    /* Content Layout */
    .content-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      width: 100%;
      height: 100%;
      padding: 80px;
    }

    .left-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 620px;
    }

    .right-column {
      flex: 1;
      position: relative;
      perspective: 1200px;
    }

    /* Typography & Badges */
    .pill-container {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    .pill {
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.3);
      color: #a78bfa;
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pill.accent {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #4ade80;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 68px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
      background: linear-gradient(to right, #ffffff, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
    }

    .subtitle {
      font-size: 22px;
      color: #a1a1aa;
      line-height: 1.6;
      font-weight: 400;
      margin-bottom: 40px;
      max-width: 540px;
    }

    /* Rating Component */
    .rating-box {
      display: flex;
      align-items: center;
      gap: 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 20px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: fit-content;
    }

    .rating-score {
      font-family: 'Outfit', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #a855f7;
      line-height: 1;
      text-shadow: 0 0 30px rgba(168,85,247,0.5);
    }

    .rating-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rating-label {
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .rating-sub {
      color: #94a3b8;
      font-size: 14px;
    }

    .stars {
      display: flex;
      gap: 4px;
    }

    .star {
      width: 16px;
      height: 16px;
      background: #a855f7;
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    /* Abstract 3D Hero Elements */
    .hero-art {
      position: absolute;
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%) rotateY(-20deg) rotateX(15deg);
      width: 500px;
      height: 500px;
      transform-style: preserve-3d;
    }

    /* Glass Card - MS Word Style */
    .glass-card {
      position: absolute;
      width: 420px;
      height: 540px;
      background: rgba(15,23,42,0.5);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 12px;
      backdrop-filter: blur(24px);
      box-shadow: 
        -30px 30px 80px rgba(0,0,0,0.9),
        inset 0 0 0 1px rgba(255,255,255,0.05),
        inset 0 20px 40px rgba(124,58,237,0.1);
      padding: 0;
      display: flex;
      flex-direction: column;
      transform: translateZ(50px);
      overflow: hidden;
    }

    /* Word Ribbon Header */
    .word-header {
      height: 60px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
    }
    
    .word-icon {
      width: 24px;
      height: 24px;
      background: #2563eb;
      border-radius: 4px;
      color: white;
      font-weight: 900;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
    }

    .word-tabs {
      display: flex;
      gap: 15px;
    }
    .w-tab {
      height: 6px;
      width: 30px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }
    .w-tab.active {
      background: #a855f7;
      box-shadow: 0 0 10px #a855f7;
    }

    /* Word Body with AI Text Generation */
    .word-body {
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
    }
    
    .text-line {
      height: 14px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    
    .text-line::after {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 50%;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.4), transparent);
      animation: scanline 2s infinite linear;
    }
    
    @keyframes scanline {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(300%); }
    }

    .ai-block {
      padding: 20px;
      background: rgba(124,58,237,0.1);
      border-left: 4px solid #a855f7;
      border-radius: 0 8px 8px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Floating Abstract Elements */
    .float-spark {
      position: absolute;
      top: 10%;
      right: -40px;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #7c3aed, #d8b4fe);
      border-radius: 24px;
      transform: translateZ(180px) rotate(15deg);
      box-shadow: 0 30px 60px rgba(124,58,237,0.4), inset 0 2px 10px rgba(255,255,255,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 50px;
      color: white;
    }

    .float-badge {
      position: absolute;
      bottom: 15%;
      left: -60px;
      background: rgba(15,23,42,0.8);
      border: 1px solid #a855f7;
      padding: 15px 25px;
      border-radius: 16px;
      transform: translateZ(120px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .float-badge-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #a855f7;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 20px;
    }
    .float-badge-text div:first-child {
      color: #fff;
      font-weight: 700;
      font-size: 16px;
    }
    .float-badge-text div:last-child {
      color: #d8b4fe;
      font-size: 12px;
      margin-top: 4px;
    }

    /* 3D Wireframe Grid below card */
    .wire-grid {
      position: absolute;
      bottom: -100px;
      left: -50px;
      width: 600px;
      height: 300px;
      background-image: 
        linear-gradient(rgba(124,58,237,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.3) 1px, transparent 1px);
      background-size: 40px 40px;
      transform: rotateX(70deg) translateZ(-100px);
      opacity: 0.5;
    }

    /* ToolStack Brand Tag */
    .brand-tag {
      position: absolute;
      top: 40px;
      left: 80px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
    }
    .brand-logo {
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #000;
      font-weight: 900;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
    }
    .brand-name {
      color: #fff;
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="banner-canvas">
    <div class="bg-grid"></div>
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <div class="brand-tag">
      <div class="brand-logo">T</div>
      <div class="brand-name">TOOLSTACK</div>
    </div>

    <div class="content-wrapper">
      <div class="left-column">
        <div class="pill-container">
          <div class="pill">MICROSOFT WORD ADD-IN</div>
          <div class="pill accent">BEATS COPILOT?</div>
        </div>

        <h1 class="title">Genspark For Word Review.</h1>
        <p class="subtitle">Free AI inside Microsoft Word — live research, drafting, and images. We tested it vs Copilot. Here's the verdict.</p>

        <div class="rating-box">
          <div class="rating-score">8.6</div>
          <div class="rating-text">
            <div class="rating-label">TOP PERFORMER</div>
            <div class="stars">
              <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star" style="clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); opacity:0.6"></div>
            </div>
            <div class="rating-sub">100 Free Credits / Day</div>
          </div>
        </div>
      </div>

      <div class="right-column">
        <div class="hero-art">
          <div class="wire-grid"></div>
          
          <!-- Main Glass Dashboard representing Word + AI -->
          <div class="glass-card">
            <div class="word-header">
              <div class="word-icon">W</div>
              <div class="word-tabs">
                <div class="w-tab"></div>
                <div class="w-tab active"></div>
                <div class="w-tab"></div>
              </div>
            </div>
            
            <div class="word-body">
              <div class="text-line" style="width: 100%"></div>
              <div class="text-line" style="width: 80%"></div>
              <div class="text-line" style="width: 90%"></div>
              
              <div class="ai-block">
                <div class="text-line" style="width: 100%; background: rgba(255,255,255,0.2)"></div>
                <div class="text-line" style="width: 85%; background: rgba(255,255,255,0.2)"></div>
                <div class="text-line" style="width: 60%; background: rgba(255,255,255,0.2)"></div>
              </div>

              <div class="text-line" style="width: 95%"></div>
              <div class="text-line" style="width: 70%"></div>
            </div>
          </div>

          <!-- Floating Elements -->
          <div class="float-spark">✦</div>
          
          <div class="float-badge">
            <div class="float-badge-icon">🌐</div>
            <div class="float-badge-text">
              <div>Live Web Research</div>
              <div>50+ Sources Cited</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</body>
</html>
