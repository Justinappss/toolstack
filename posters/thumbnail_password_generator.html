<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator Thumbnail - Dark Wealth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Outfit:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Inter', sans-serif;
    }

    .banner-canvas {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #050505;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      padding: 80px 60px;
    }

    /* Cinematic Lighting & Background */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 1;
      opacity: 0.6;
    }

    .glow-sphere-1 {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(220,38,38,0.15) 0%, transparent 60%);
      filter: blur(80px);
      z-index: 2;
    }

    .glow-sphere-2 {
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(34,197,94,0.15) 0%, transparent 60%);
      filter: blur(100px);
      z-index: 2;
    }

    /* Content Layout */
    .header-section {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 70px;
      margin-top: 10px;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 78px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      text-transform: uppercase;
      background: linear-gradient(to bottom right, #4ade80, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(34,197,94,0.4));
    }

    .subtitle {
      font-size: 32px;
      color: #e2e8f0;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .subtitle span {
      color: #94a3b8;
      margin: 0 15px;
    }

    .comparison-section {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      gap: 60px;
      width: 100%;
    }

    /* Cards */
    .card {
      width: 460px;
      height: 340px;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      backdrop-filter: blur(24px);
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 30px;
      padding: 2px;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card-red {
      background: linear-gradient(135deg, rgba(220,38,38,0.1), rgba(153,27,27,0.3));
    }
    .card-red::before {
      background: linear-gradient(135deg, rgba(248,113,113,0.6), rgba(220,38,38,0.1));
    }

    .card-green {
      background: linear-gradient(135deg, rgba(34,197,94,0.1), rgba(21,128,61,0.3));
      transform: scale(1.05); /* slightly emphasize the good side */
      box-shadow: 0 40px 100px rgba(21,128,61,0.2), inset 0 0 40px rgba(34,197,94,0.1);
    }
    .card-green::before {
      background: linear-gradient(135deg, rgba(134,239,172,0.8), rgba(34,197,94,0.2));
    }

    /* Icons */
    .icon-container {
      margin-bottom: 30px;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
    }

    .lock-svg {
      width: 140px;
      height: 140px;
    }

    /* Badges */
    .badge {
      padding: 12px 28px;
      border-radius: 100px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-red {
      background: rgba(220,38,38,0.2);
      color: #fca5a5;
      border: 1px solid rgba(248,113,113,0.3);
      box-shadow: 0 0 20px rgba(220,38,38,0.4);
    }

    .badge-green {
      background: rgba(34,197,94,0.2);
      color: #86efac;
      border: 1px solid rgba(134,239,172,0.4);
      box-shadow: 0 0 30px rgba(34,197,94,0.5);
    }
    
    .badge-sub {
      position: absolute;
      bottom: 25px;
      font-size: 16px;
      color: #a7f3d0;
      opacity: 0.8;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* VS divider */
    .vs-divider {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background: #111;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 24px;
      color: #fff;
      z-index: 20;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }

    /* ToolStack Brand Tag */
    .brand-tag {
      position: absolute;
      bottom: 40px;
      right: 50px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
    .brand-logo {
      width: 32px;
      height: 32px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #000;
      font-weight: 900;
      font-size: 18px;
      font-family: 'Outfit', sans-serif;
    }
    .brand-name {
      color: #fff;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="banner-canvas">
    <div class="bg-grid"></div>
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <div class="header-section">
      <h1 class="title">FREE PASSWORD GENERATOR 2026</h1>
      <div class="subtitle">
        No Signup <span>•</span> No Limits <span>•</span> 100% Private
      </div>
    </div>

    <div class="comparison-section">
      <div class="vs-divider">VS</div>
      
      <!-- Left: Weak Password -->
      <div class="card card-red">
        <div class="icon-container">
          <!-- Cracked Padlock SVG -->
          <svg class="lock-svg" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="rgba(239,68,68,0.2)"></rect>
            <!-- Shackle opened/broken -->
            <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
            <!-- Crack through the lock body -->
            <path d="M12 11l-2 4 4 2-3 5"></path>
          </svg>
        </div>
        <div class="badge badge-red">
          <span style="color: #ef4444">✖</span> WEAK
        </div>
      </div>

      <!-- Right: Strong Password -->
      <div class="card card-green">
        <div class="icon-container">
          <!-- Strong Locked Padlock SVG -->
          <svg class="lock-svg" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="rgba(34,197,94,0.2)"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            <!-- Keyhole -->
            <circle cx="12" cy="15" r="1" fill="#22c55e"></circle>
            <path d="M12 16v2"></path>
            <!-- Shield overlay for extra security feel -->
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="rgba(34,197,94,0.5)" fill="none" stroke-width="1" stroke-dasharray="2 2" transform="scale(1.4) translate(-3.4, -3.4)"></path>
          </svg>
        </div>
        <div class="badge badge-green">
          <span style="color: #22c55e">✓</span> 34,000 YEARS TO CRACK
        </div>
        <div class="badge-sub">MILITARY-GRADE ENCRYPTION</div>
      </div>
    </div>

    <!-- ToolStack Logo -->
    <div class="brand-tag">
      <div class="brand-logo">T</div>
      <div class="brand-name">TOOLSTACK</div>
    </div>
  </div>
</body>
</html>
