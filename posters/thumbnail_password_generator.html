<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator Thumbnail - Dark Wealth</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Outfit:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Inter', sans-serif;
    }

    .banner-canvas {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #050505;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* Cinematic Lighting & Background */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 1;
      opacity: 0.6;
    }

    .glow-sphere-1 {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(220,38,38,0.2) 0%, transparent 60%);
      filter: blur(80px);
      z-index: 2;
    }

    .glow-sphere-2 {
      position: absolute;
      bottom: -20%;
      right: 10%;
      width: 1000px;
      height: 1000px;
      background: radial-gradient(circle, rgba(34,197,94,0.2) 0%, transparent 60%);
      filter: blur(100px);
      z-index: 2;
    }

    /* Person / Face Image */
    .face-cutout {
      position: absolute;
      bottom: 0;
      right: -20px;
      height: 750px;
      z-index: 15;
      filter: drop-shadow(-20px 0 30px rgba(0,0,0,0.8));
    }

    /* Content Layout */
    .content-wrapper {
      position: relative;
      z-index: 20;
      width: 55%;
      height: 100%;
      padding: 60px 0 60px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .header-section {
      width: 100%;
      margin-bottom: 50px;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 72px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 15px;
      text-transform: uppercase;
      background: linear-gradient(to bottom right, #4ade80, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 40px rgba(34,197,94,0.5));
    }

    .subtitle {
      font-size: 22px;
      color: #e2e8f0;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .subtitle span {
      color: #94a3b8;
      margin: 0 10px;
    }

    .comparison-section {
      display: flex;
      flex-direction: column;
      gap: 25px;
      width: 100%;
    }

    /* Cards */
    .card {
      width: 100%;
      height: 160px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      padding: 0 25px;
      position: relative;
      backdrop-filter: blur(24px);
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 2px;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card-red {
      background: linear-gradient(135deg, rgba(220,38,38,0.15), rgba(153,27,27,0.4));
    }
    .card-red::before {
      background: linear-gradient(135deg, rgba(248,113,113,0.6), rgba(220,38,38,0.1));
    }

    .card-green {
      background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(21,128,61,0.4));
      transform: scale(1.03) translateX(20px);
      box-shadow: 0 30px 60px rgba(21,128,61,0.3), inset 0 0 40px rgba(34,197,94,0.15);
      z-index: 25;
    }
    .card-green::before {
      background: linear-gradient(135deg, rgba(134,239,172,0.8), rgba(34,197,94,0.2));
    }

    /* Icons */
    .icon-container {
      flex-shrink: 0;
      margin-right: 30px;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    .lock-svg {
      width: 100px;
      height: 100px;
    }

    /* Badges */
    .badge-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .badge {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: 'Outfit', sans-serif;
    }

    .badge-red {
      color: #fca5a5;
      text-shadow: 0 0 20px rgba(220,38,38,0.5);
    }

    .badge-green {
      color: #86efac;
      text-shadow: 0 0 30px rgba(34,197,94,0.6);
    }
    
    .badge-sub {
      font-size: 18px;
      color: #d1d5db;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* VS divider */
    .vs-divider {
      position: absolute;
      top: 50%;
      right: -30px;
      transform: translateY(-50%);
      width: 60px;
      height: 60px;
      background: #111;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 20px;
      color: #fff;
      z-index: 30;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    /* ToolStack Brand Tag */
    .brand-tag {
      position: absolute;
      top: 30px;
      right: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
    .brand-logo {
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #000;
      font-weight: 900;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
    }
    .brand-name {
      color: #fff;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="banner-canvas">
    <div class="bg-grid"></div>
    <div class="glow-sphere-1"></div>
    <div class="glow-sphere-2"></div>

    <!-- The Shocked Face (Trump) Cutout -->
    <img src="../public/blog/trump_cutout.png" class="face-cutout" alt="Trump Shocked" />

    <div class="content-wrapper">
      <div class="header-section">
        <h1 class="title">FREE PASSWORD GENERATOR 2026</h1>
        <div class="subtitle">
          No Signup <span>•</span> No Limits <span>•</span> 100% Private
        </div>
      </div>

      <div class="comparison-section">
        <!-- Weak Password -->
        <div class="card card-red">
          <div class="icon-container">
            <svg class="lock-svg" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="rgba(239,68,68,0.2)"></rect>
              <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
              <path d="M12 11l-2 4 4 2-3 5"></path>
            </svg>
          </div>
          <div class="badge-container">
            <div class="badge badge-red"><span style="color: #ef4444">✖</span> WEAK</div>
            <div class="badge-sub">INSTANTLY CRACKED</div>
          </div>
          <div class="vs-divider">VS</div>
        </div>

        <!-- Strong Password -->
        <div class="card card-green">
          <div class="icon-container">
            <svg class="lock-svg" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" fill="rgba(34,197,94,0.2)"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              <circle cx="12" cy="15" r="1" fill="#22c55e"></circle>
              <path d="M12 16v2"></path>
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="rgba(34,197,94,0.5)" fill="none" stroke-width="1" stroke-dasharray="2 2" transform="scale(1.4) translate(-3.4, -3.4)"></path>
            </svg>
          </div>
          <div class="badge-container">
            <div class="badge badge-green"><span style="color: #22c55e">✓</span> 34,000 YEARS TO CRACK</div>
            <div class="badge-sub">MILITARY-GRADE ENCRYPTION</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ToolStack Logo -->
    <div class="brand-tag">
      <div class="brand-logo">T</div>
      <div class="brand-name">TOOLSTACK</div>
    </div>
  </div>
</body>
</html>
