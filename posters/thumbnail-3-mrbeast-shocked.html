<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Word Counter Thumbnail 3 — MrBeast Shocked</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px; overflow: hidden;
    font-family: 'Impact', 'Arial Black', sans-serif;
    background: #000;
  }
  .bg-base {
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, #00d2ff 0%, #001f3f 100%);
  }
  .sunburst {
    position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: repeating-conic-gradient(from 0deg, rgba(255,255,255,0.1) 0deg 10deg, transparent 10deg 20deg);
    animation: rotate 60s linear infinite;
  }
  @keyframes rotate { 100% { transform: rotate(360deg); } }
  
  .photo {
    position: absolute; left: -80px; bottom: -20px;
    height: 110%; width: auto; z-index: 10;
    filter: drop-shadow(15px 0px 30px rgba(0,0,0,0.8)) contrast(1.15) saturate(1.2);
  }

  .text-container {
    position: absolute; top: 80px; right: 40px; z-index: 20;
    display: flex; flex-direction: column; transform: rotate(4deg);
    align-items: flex-end;
  }

  .text-line-1 {
    font-size: 200px; color: #ff0000; line-height: 0.9;
    text-transform: uppercase;
    -webkit-text-stroke: 6px #000;
    text-shadow: 12px 12px 0 #000, 0 0 50px #ff0000;
  }
  .text-line-2 {
    font-size: 150px; color: #fff; line-height: 0.9;
    text-transform: uppercase;
    -webkit-text-stroke: 5px #000;
    text-shadow: 10px 10px 0 #000;
    margin-top: 10px;
  }
  .text-line-3 {
    font-size: 180px; color: #ffe600; line-height: 0.85;
    text-transform: uppercase;
    -webkit-text-stroke: 6px #000;
    text-shadow: 12px 12px 0 #000, 0 0 60px #ffe600;
    margin-top: 10px;
  }

  /* Giant Arrow pointing from his finger to the word SCORE */
  .arrow {
    position: absolute; top: 300px; left: 520px; z-index: 15;
    width: 250px; height: 250px;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10,50 L50,10 L50,30 L90,30 L90,70 L50,70 L50,90 Z" fill="%23ff0000" stroke="black" stroke-width="4"/></svg>') no-repeat center;
    background-size: contain;
    transform: rotate(15deg);
    filter: drop-shadow(10px 10px 0px #000);
  }
</style>
</head>
<body>
  <div class="bg-base"></div>
  <div class="sunburst"></div>
  
  <img src="assets/pereira_shocked.png" class="photo" alt="Alex Pereira Shocked">

  <div class="arrow"></div>

  <div class="text-container">
    <div class="text-line-1">0/100</div>
    <div class="text-line-2">READING</div>
    <div class="text-line-3">SCORE!</div>
  </div>
</body>
</html>
