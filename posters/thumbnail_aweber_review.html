<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thumbnail: AWeber Review</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Inter', sans-serif;
    }

    /* 16:9 Aspect Ratio Container */
    .thumbnail-container {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #050505;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      background: radial-gradient(circle at 30% 50%, #151515 0%, #050505 80%);
    }

    /* Top Right Star Rating */
    .star-rating {
      position: absolute;
      top: 40px;
      right: 50px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 20;
    }

    .star-icon {
      font-size: 80px;
      color: #f97316;
      filter: drop-shadow(0 0 30px rgba(249, 115, 22, 0.8));
      line-height: 1;
      margin-bottom: 5px;
    }

    .rating-text {
      font-family: 'Oswald', sans-serif;
      font-size: 45px;
      font-weight: 700;
      color: #fff;
      background: #000;
      padding: 5px 20px;
      border-radius: 12px;
      border: 2px solid #f97316;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    /* Left Side: Logo and Badge */
    .left-section {
      flex: 0 0 45%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .aweber-text {
      font-family: 'Inter', sans-serif;
      font-size: 110px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -3px;
      text-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .aweber-icon {
      width: 80px;
      height: 80px;
      background: #fff;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    
    .aweber-icon svg {
      width: 50px;
      height: 50px;
      fill: #050505;
    }

    .review-badge {
      background: #f97316;
      color: #050505;
      font-family: 'Oswald', sans-serif;
      font-size: 65px;
      font-weight: 700;
      padding: 10px 40px;
      border-radius: 12px;
      text-transform: uppercase;
      box-shadow: 0 15px 30px rgba(249, 115, 22, 0.4);
      transform: rotate(-3deg);
    }

    /* Bottom Left: Reviewer Profile */
    .profile-container {
      position: absolute;
      bottom: 40px;
      left: 60px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background-image: url('file:///Users/justinpirrie/.gemini/antigravity/brain/26382741-1e59-498f-acde-3b4f063df801/perfect_crop_headshot.png');
      background-size: cover;
      background-position: center;
      border: 4px solid #fff;
      box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 40px rgba(255,255,255,0.2);
      z-index: 20;
    }

    /* Right Side: Split Comparison Card */
    .right-section {
      flex: 0 0 50%;
      height: 500px;
      display: flex;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      border: 2px solid rgba(255,255,255,0.1);
      transform: perspective(1000px) rotateY(-10deg);
      z-index: 10;
    }

    .split-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    /* Green Side (Free Plan) */
    .side-green {
      background: linear-gradient(135deg, #16a34a 0%, #14532d 100%);
      border-right: 4px solid #050505;
    }

    .check-icon {
      font-size: 140px;
      color: #4ade80;
      line-height: 1;
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
    }

    .green-text {
      font-family: 'Oswald', sans-serif;
      font-size: 55px;
      color: #fff;
      text-align: center;
      line-height: 1.1;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }

    /* Dark Side (Worth It?) */
    .side-dark {
      background: linear-gradient(135deg, #262626 0%, #0a0a0a 100%);
    }

    .question-icon {
      font-size: 140px;
      color: #a3a3a3;
      font-family: 'Oswald', sans-serif;
      line-height: 1;
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
    }

    .dark-text {
      font-family: 'Oswald', sans-serif;
      font-size: 55px;
      color: #fff;
      text-align: center;
      line-height: 1.1;
      text-shadow: 0 5px 15px rgba(0,0,0,0.8);
    }

  </style>
</head>
<body>

  <div class="thumbnail-container">
    
    <!-- Top Right Star Rating -->
    <div class="star-rating">
      <div class="star-icon">★</div>
      <div class="rating-text">8.2/10</div>
    </div>

    <!-- Bottom Left Profile -->
    <div class="profile-container"></div>

    <!-- Left Side: Logo & Badge -->
    <div class="left-section">
      <div class="logo-container">
        <div class="aweber-text">AWeber</div>
        <div class="aweber-icon">
          <!-- Stylized envelope/A icon placeholder -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 18H4V8L12 13L20 8V18ZM12 11L4 6H20L12 11Z"/>
          </svg>
        </div>
      </div>
      <div class="review-badge">REVIEW 2026</div>
    </div>

    <!-- Right Side: Split Card -->
    <div class="right-section">
      <!-- Free Plan Side -->
      <div class="split-side side-green">
        <div class="check-icon">✓</div>
        <div class="green-text">FREE<br>PLAN</div>
      </div>
      
      <!-- Worth It Side -->
      <div class="split-side side-dark">
        <div class="question-icon">?</div>
        <div class="dark-text">WORTH<br>IT?</div>
      </div>
    </div>

  </div>

</body>
</html>
