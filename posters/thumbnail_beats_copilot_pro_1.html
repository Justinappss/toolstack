<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thumbnail: Beats Copilot PRO 1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Inter', sans-serif;
    }

    /* 16:9 Aspect Ratio Container */
    .thumbnail-container {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #030305;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 80px;
    }

    /* Background Elements */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
    }

    .ambient-glow-purple {
      position: absolute;
      top: 50%;
      right: 20%;
      transform: translateY(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.4) 0%, rgba(0,0,0,0) 70%);
      z-index: 2;
    }

    .ambient-glow-blue {
      position: absolute;
      top: 50%;
      left: 20%;
      transform: translateY(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.2) 0%, rgba(0,0,0,0) 70%);
      z-index: 2;
    }

    /* Left Text Hook */
    .text-section {
      position: relative;
      flex: 0 0 35%;
      z-index: 10;
    }

    .headline {
      font-size: 110px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -3px;
      color: #fff;
    }

    .headline .highlight {
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 10px 20px rgba(59, 130, 246, 0.4));
    }

    /* Logos Area */
    .visual-section {
      flex: 0 0 60%;
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      z-index: 10;
    }

    /* Microsoft Word Card */
    .ms-card {
      width: 240px;
      height: 320px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .ms-icon {
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #2b579a 0%, #1a365d 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      font-weight: 900;
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }

    .ms-text {
      font-size: 24px;
      font-weight: 700;
      color: #94a3b8;
      letter-spacing: 1px;
    }

    /* VS Badge */
    .vs-badge {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #f97316 0%, #c2410c 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 900;
      font-style: italic;
      color: #fff;
      box-shadow: 0 0 30px rgba(249, 115, 22, 0.6), inset 0 2px 10px rgba(255,255,255,0.4);
      border: 4px solid #030305;
      z-index: 20;
    }

    /* Genspark Card */
    .gs-card {
      width: 280px;
      height: 360px;
      background: rgba(124, 58, 237, 0.1);
      border: 2px solid rgba(124, 58, 237, 0.4);
      border-radius: 30px;
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 40px rgba(124, 58, 237, 0.2), inset 0 1px 0 rgba(255,255,255,0.2);
      transform: scale(1.05); /* Make it slightly bigger to show dominance */
    }

    .gs-icon {
      width: 160px;
      height: 160px;
      background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
      box-shadow: 0 15px 30px rgba(139, 92, 246, 0.5);
    }

    .gs-icon svg {
      width: 90px;
      height: 90px;
      fill: white;
    }

    .gs-text {
      font-size: 38px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

  </style>
</head>
<body>

  <div class="thumbnail-container">
    
    <div class="bg-grid"></div>
    <div class="ambient-glow-blue"></div>
    <div class="ambient-glow-purple"></div>

    <!-- LEFT TEXT -->
    <div class="text-section">
      <div class="headline">
        BEATS<br>
        <span class="highlight">COPILOT?</span>
      </div>
    </div>

    <!-- RIGHT VISUALS -->
    <div class="visual-section">
      
      <!-- Microsoft Word -->
      <div class="ms-card">
        <div class="ms-icon">W</div>
        <div class="ms-text">WORD</div>
      </div>

      <!-- VS Badge -->
      <div class="vs-badge">VS</div>

      <!-- Genspark -->
      <div class="gs-card">
        <div class="gs-icon">
          <!-- Sparkle/AI SVG Icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.8 10.3l-2.6-1.1c-.5-.2-.9-.6-1.1-1.1L15 5.5c-.3-.7-1.3-.7-1.6 0l-1.1 2.6c-.2.5-.6.9-1.1 1.1L8.6 10.3c-.7.3-.7 1.3 0 1.6l2.6 1.1c.5.2.9.6 1.1 1.1l1.1 2.6c.3.7 1.3.7 1.6 0l1.1-2.6c.2-.5.6-.9 1.1-1.1l2.6-1.1c.7-.3.7-1.3 0-1.6zM11.6 4.3L12.5 2c.1-.4.7-.4.8 0l.9 2.3c.1.3.3.5.6.6l2.3.9c.4.1.4.7 0 .8l-2.3.9c-.3.1-.5.3-.6.6L13.3 10.4c-.1.4-.7.4-.8 0l-.9-2.3c-.1-.3-.3-.5-.6-.6L8.7 6.6c-.4-.1-.4-.7 0-.8l2.3-.9c.3-.1.5-.3.6-.6zM5.5 13.5c-.4-.1-.4-.7 0-.8l2.3-.9c.3-.1.5-.3.6-.6L9.3 8.9c.1-.4.7-.4.8 0l.9 2.3c.1.3.3.5.6.6l2.3.9c.4.1.4.7 0 .8l-2.3.9c-.3.1-.5.3-.6.6l-.9 2.3c-.1.4-.7.4-.8 0l-.9-2.3c-.1-.3-.3-.5-.6-.6L5.5 13.5z"/>
          </svg>
        </div>
        <div class="gs-text">GENSPARK</div>
      </div>

    </div>

  </div>

</body>
</html>
