<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thumbnail: AWeber Review v2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,800;0,900;1,900&family=Roboto:wght@700;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #111;
      font-family: 'Roboto', sans-serif;
    }

    /* 16:9 Aspect Ratio Container */
    .thumbnail-container {
      position: relative;
      width: 1280px;
      height: 720px;
      background-color: #050505;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      display: flex;
    }

    /* Background Elements */
    .bg-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.02) 2px, transparent 2px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 2px, transparent 2px);
      background-size: 60px 60px;
      z-index: 1;
    }

    .orange-glow {
      position: absolute;
      top: -100px;
      left: 20%;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, rgba(0,0,0,0) 60%);
      z-index: 2;
    }

    /* Top Center Star Rating Pill */
    .star-pill {
      position: absolute;
      top: 30px;
      right: 40px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      padding: 15px 35px;
      border-radius: 50px;
      z-index: 30;
      box-shadow: 0 10px 30px rgba(249, 115, 22, 0.5), inset 0 2px 10px rgba(255,255,255,0.3);
      border: 3px solid #fff;
    }

    .star-icon {
      font-size: 45px;
      color: #fff;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .rating-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 45px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }

    /* Left Section: Branding */
    .left-section {
      position: absolute;
      left: 0;
      top: 0;
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 60px;
      z-index: 20;
    }

    .brand-group {
      transform: rotate(-4deg);
      margin-bottom: 80px;
    }

    .aweber-headline {
      display: flex;
      align-items: center;
      gap: 25px;
      margin-bottom: 10px;
    }

    .aweber-icon {
      width: 100px;
      height: 100px;
      background: #fff;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.6);
    }
    
    .aweber-icon svg {
      width: 60px;
      height: 60px;
      fill: #050505;
    }

    .aweber-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 140px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -4px;
      line-height: 1;
      text-shadow: 0 15px 30px rgba(0,0,0,0.8);
    }

    .review-badge {
      display: inline-block;
      background: #f97316;
      color: #050505;
      font-family: 'Montserrat', sans-serif;
      font-size: 70px;
      font-weight: 900;
      font-style: italic;
      padding: 10px 40px;
      border-radius: 12px;
      text-transform: uppercase;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.4);
    }

    /* Reviewer Profile */
    .profile-wrap {
      position: absolute;
      bottom: -10px;
      left: 60px;
      z-index: 25;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .profile-img {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background-image: url('file:///Users/justinpirrie/.gemini/antigravity/brain/26382741-1e59-498f-acde-3b4f063df801/perfect_crop_headshot.png');
      background-size: cover;
      background-position: center top;
      border: 6px solid #f97316;
      box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 40px rgba(249, 115, 22, 0.4);
    }

    .profile-label {
      background: #111;
      color: #fff;
      font-family: 'Roboto', sans-serif;
      font-size: 24px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 8px;
      border: 2px solid #333;
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
    }

    /* Right Section: Split Background */
    .right-section {
      position: absolute;
      right: -50px;
      top: -50px;
      width: 60%;
      height: 820px;
      display: flex;
      flex-direction: column;
      z-index: 10;
      transform: rotate(8deg);
      box-shadow: -20px 0 60px rgba(0,0,0,0.9);
      border-left: 8px solid #333;
      overflow: hidden;
    }

    /* Top Half (Green) */
    .split-top {
      flex: 1;
      background: linear-gradient(135deg, #22c55e 0%, #166534 100%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 40px;
      border-bottom: 8px solid #050505;
    }

    .green-content {
      transform: rotate(-8deg); /* Counter rotate */
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .green-icon {
      font-size: 130px;
      color: #fff;
      font-weight: 900;
      line-height: 1;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    .green-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 80px;
      font-weight: 900;
      color: #fff;
      line-height: 0.9;
      text-shadow: 0 10px 20px rgba(0,0,0,0.6);
    }

    /* Bottom Half (Dark) */
    .split-bottom {
      flex: 1;
      background: linear-gradient(135deg, #262626 0%, #0a0a0a 100%);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 50px;
    }

    .dark-content {
      transform: rotate(-8deg); /* Counter rotate */
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .dark-icon {
      font-size: 150px;
      color: #a3a3a3;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      line-height: 1;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
    }

    .dark-text {
      font-family: 'Montserrat', sans-serif;
      font-size: 80px;
      font-weight: 900;
      color: #fff;
      line-height: 0.9;
      text-shadow: 0 10px 20px rgba(0,0,0,0.8);
    }

  </style>
</head>
<body>

  <div class="thumbnail-container">
    
    <div class="bg-grid"></div>
    <div class="orange-glow"></div>

    <!-- Top Right Star Rating Pill -->
    <div class="star-pill">
      <div class="star-icon">★</div>
      <div class="rating-text">8.2/10</div>
    </div>

    <!-- Left Branding Section -->
    <div class="left-section">
      <div class="brand-group">
        <div class="aweber-headline">
          <div class="aweber-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 4H4C2.9 4 2.01 4.9 2.01 6L2 18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4ZM20 18H4V8L12 13L20 8V18ZM12 11L4 6H20L12 11Z"/>
            </svg>
          </div>
          <div class="aweber-text">AWeber</div>
        </div>
        <div class="review-badge">REVIEW 2026</div>
      </div>
    </div>

    <!-- Bottom Left Profile -->
    <div class="profile-wrap">
      <div class="profile-img"></div>
      <div class="profile-label">HONEST<br>REVIEW</div>
    </div>

    <!-- Right Diagonal Split Section -->
    <div class="right-section">
      
      <!-- Top Green -->
      <div class="split-top">
        <div class="green-content">
          <div class="green-icon">✓</div>
          <div class="green-text">FREE<br>PLAN</div>
        </div>
      </div>

      <!-- Bottom Dark -->
      <div class="split-bottom">
        <div class="dark-content">
          <div class="dark-icon">?</div>
          <div class="dark-text">WORTH<br>IT?</div>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
